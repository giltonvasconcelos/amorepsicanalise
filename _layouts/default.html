<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Amor e Psicanálise</title>
    <style>
        /* COPIE TODO O CSS DO SEU INDEX.HTML ANTIGO AQUI */
        * { ... }
        :root { ... }
        .side-menu { ... }
        .menu-btn { ... }
        /* TODO O RESTO DO CSS */
    </style>
</head>
<body>
    <!-- MENU LATERAL -->
    <div id="sideMenu" class="side-menu">
        <a href="javascript:void(0)" class="close-btn" onclick="closeMenu()">&times;</a>
        <a href="/" onclick="closeMenu()">🏠 Página Inicial</a>
        <a href="/pages/psicanalise/" onclick="closeMenu()">🎯 Objetivo da Psicanálise</a>
        <a href="/artigos/" onclick="closeMenu()">📝 Artigos & Reflexões</a>
        <a href="/pages/sobre/" onclick="closeMenu()">📖 Sobre esse Projeto</a>
        <a href="/pages/faq/" onclick="closeMenu()">❓ Perguntas Frequentes</a>
        <a href="/pages/termos/" onclick="closeMenu()">📄 Termos de Uso</a>
        <a href="/pages/privacidade/" onclick="closeMenu()">🔒 Política de Privacidade</a>
    </div>

    <button class="menu-btn" onclick="openMenu()">☰</button>

    <!-- CONTEÚDO PRINCIPAL (vem do arquivo que usa este layout) -->
    <div class="main-content" id="mainContent">
        {{ content }}
    </div>

    <script>
        function openMenu() {
            document.getElementById("sideMenu").style.width = "280px";
            document.getElementById("mainContent").style.marginLeft = "280px";
            if (window.innerWidth <= 768) {
                document.getElementById("mainContent").style.marginLeft = "0";
            }
        }

        function closeMenu() {
            document.getElementById("sideMenu").style.width = "0";
            document.getElementById("mainContent").style.marginLeft = "0";
        }

        window.addEventListener('resize', function() {
            if (window.innerWidth <= 768) {
                if (document.getElementById("sideMenu").style.width === "280px") {
                    document.getElementById("mainContent").style.marginLeft = "0";
                }
            } else {
                if (document.getElementById("sideMenu").style.width === "280px") {
                    document.getElementById("mainContent").style.marginLeft = "280px";
                }
            }
        });
    </script>
</body>
</html>
